schema_version: "1.0"
description: >
  End-to-end audit trail linking every user request to the spec, architectural decisions,
  code changes, and PR that fulfilled it.

ai_instructions: |
  Update this file whenever any link in the chain is established — do not wait until
  work is complete. A partial entry is better than no entry.
  Use the next sequential id from next_tr_id below.

entry_schema:
  id: string           # e.g. "TR-001"
  date: string         # ISO 8601 date, e.g. "2026-02-26"
  session: integer     # session id from SESSION_LOG.yaml
  request: string      # the original user request or issue title
  spec: string         # path to spec file, e.g. "specs/features/FEAT-0001.yaml", or null
  adr: string          # e.g. "ADR-001", or null
  key_files_changed:
    - string           # repo-relative file paths (most significant; not exhaustive)
  pr_or_commit: string # PR number or commit hash, or null
  status: string       # enum: in-progress | implemented | merged | superseded | abandoned

next_tr_id: 4

cross_references:
  decisions: ".ai/decisions/INDEX.yaml"
  session_log: ".ai/memory/SESSION_LOG.yaml"
  learnings: ".ai/memory/LEARNINGS.yaml"

traces:

  - id: "TR-001"
    date: "2026-02-26"
    session: 1
    request: "Populate all .ai/ and .claude/ template placeholder files with real project context"
    spec: null
    adr: null
    key_files_changed:
      - ".ai/CONTEXT.md"
      - ".ai/DIRECTIVES.md"
      - ".ai/architecture/ARCHITECTURE.md"
      - ".ai/architecture/PATTERNS.md"
      - ".ai/memory/SESSION_LOG.md"
      - ".ai/memory/LEARNINGS.md"
      - ".ai/memory/TRACEABILITY.md"
    pr_or_commit: "6b99dbb"
    status: merged

  - id: "TR-002"
    date: "2026-02-26"
    session: 1
    request: "Reformat memory files to machine-parseable YAML (parseable by yq, Python, grep)"
    spec: null
    adr: null
    key_files_changed:
      - ".ai/memory/SESSION_LOG.yaml"
      - ".ai/memory/LEARNINGS.yaml"
      - ".ai/memory/TRACEABILITY.yaml"
      - ".ai/memory/AUTHORIZATIONS.yaml"
      - ".ai/memory/README.md"
      - ".ai/DIRECTIVES.md"
      - ".ai/CONTEXT.md"
      - ".ai/config.yaml"
    pr_or_commit: "3ed8975"
    status: merged

  - id: "TR-003"
    date: "2026-02-26"
